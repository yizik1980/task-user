name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build & test data-layer
  # ──────────────────────────────────────────────
  data-layer:
    name: Data Layer — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=data-layer

      - name: Build
        run: npm run build --workspace=data-layer

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-layer-dist
          path: data-layer/dist
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 2: Build & test backend
  # ──────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    needs: data-layer
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRY: 24h
      PORT: 3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Download data-layer dist
        uses: actions/download-artifact@v4
        with:
          name: data-layer-dist
          path: data-layer/dist

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Build shared
        run: npm run build --workspace=shared

      - name: Build
        run: npm run build --workspace=backend

      - name: Test
        run: npm test --workspace=backend --if-present

  # ──────────────────────────────────────────────
  # JOB 3: Build & push Docker image (backend)
  # ──────────────────────────────────────────────
  docker:
    name: Backend — Docker
    runs-on: ubuntu-latest
    needs: backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest

  # ──────────────────────────────────────────────
  # JOB 4: Build client
  # ──────────────────────────────────────────────
  client:
    name: Client — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=client

      - name: Build
        run: npm run build --workspace=client

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 4: Deploy (only on push to main)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker, client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-build
          path: client/dist

      - name: Download data-layer dist
        uses: actions/download-artifact@v4
        with:
          name: data-layer-dist
          path: data-layer/dist

      # ── Replace the steps below with your actual deploy target ──

      # Option A: Deploy backend to Railway / Render / Fly.io
